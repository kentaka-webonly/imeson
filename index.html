<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>健啓Webオンリー イメージソング企画</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#333;
line-height:1.7;

background:
linear-gradient(#f5f6f7,#e9ebee);
}


/* ヘッダー */

.hero{

width:100%;
height:340px;

background-image:url("header.jpeg");
background-size:cover;
background-position:center;

display:flex;
align-items:flex-end;
justify-content:center;

box-shadow:0 6px 20px rgba(0,0,0,.15);

}

.hero-title{

background:rgba(255,255,255,.8);

padding:12px 30px;

border-radius:12px;

margin-bottom:25px;

font-size:20px;

backdrop-filter:blur(5px);

}


/* コンテナ */

.container{

max-width:900px;

margin:auto;

padding:40px 20px 80px;

}


/* 曲一覧 */

.song-list{

background:white;

padding:25px;

border-radius:16px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

margin-bottom:60px;

}

.song-list h2{

margin-top:0;

}

.song-list ul{

list-style:none;

padding:0;

margin:0;

}

.song-list li{

padding:10px 0;

border-bottom:1px solid #eee;

}

.song-list a{

text-decoration:none;

color:#444;

transition:.2s;

}

.song-list a:hover{

color:#000;

padding-left:5px;

}


/* 曲カード */

.song-card{

background:white;

padding:25px;

border-radius:16px;

margin-bottom:40px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

opacity:0;
transform:translateY(40px);

}

.song-card.show{

opacity:1;
transform:none;

transition:all .8s ease;

}

.song-title{

font-size:20px;
font-weight:bold;

}

.artist{

color:#666;
font-size:15px;

}

iframe{

width:100%;
height:315px;

border:none;

margin-top:15px;

border-radius:10px;

}

.comment{

background:#f4f4f4;

padding:15px;

border-radius:10px;

margin-top:15px;

}


/* フッター */

.footer{

text-align:center;

color:#777;

margin-top:50px;

}

</style>
</head>

<body id="top">


<div class="hero">

<div class="hero-title">
健啓Webオンリー イメージソング企画
</div>

</div>


<div class="container">


<!-- 曲一覧 -->

<div class="song-list">

<h2>🎵 イメージソング一覧</h2>

<ul>

<li>
<a href="#song1">
01 曲名 / アーティスト
</a>
</li>

<li>
<a href="#song2">
02 曲名 / アーティスト
</a>
</li>

<li>
<a href="#song3">
03 曲名 / アーティスト
</a>
</li>

</ul>

</div>


<!-- 曲 -->

<div class="song-card" id="song1">

<div class="song-title">
01 曲名
</div>

<div class="artist">
アーティスト名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 募集コメント  
ここにコメント

</div>

</div>


<div class="song-card" id="song2">

<div class="song-title">
02 曲名
</div>

<div class="artist">
アーティスト名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント

</div>

</div>


<div class="song-card" id="song3">

<div class="song-title">
03 曲名
</div>

<div class="artist">
アーティスト名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント

</div>

</div>


<div class="footer">

健啓Webオンリー企画

</div>

</div>


<script>

/* スクロールフェードイン */

const cards=document.querySelectorAll(".song-card")

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show")

}

})

})

cards.forEach(card=>{

observer.observe(card)

})

</script>


</body>
</html>
