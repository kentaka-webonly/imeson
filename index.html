<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>健啓Webオンリー イメージソング企画</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:#333;
line-height:1.7;

background:
radial-gradient(circle at 20% 30%,#ffffff 0%,transparent 40%),
radial-gradient(circle at 80% 10%,#f1f1f1 0%,transparent 35%),
linear-gradient(#f7f7f8,#ececec);
}

/* キラキラ */

body::before{

content:"";

position:fixed;
width:100%;
height:100%;

background-image:
radial-gradient(#fff 1px, transparent 1px);

background-size:60px 60px;

opacity:.3;

pointer-events:none;

animation:twinkle 6s linear infinite;

}

@keyframes twinkle{

0%{opacity:.2}
50%{opacity:.4}
100%{opacity:.2}

}


/* ヘッダー */

.hero{

width:100%;
height:360px;

background-image:url("header.jpeg");
background-size:cover;
background-position:center;

display:flex;
align-items:flex-end;
justify-content:center;

box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.hero-title{

background:rgba(255,255,255,.85);

padding:14px 34px;

border-radius:14px;

margin-bottom:25px;

font-size:20px;

backdrop-filter:blur(6px);

box-shadow:0 5px 15px rgba(0,0,0,.1);

}


/* コンテナ */

.container{

max-width:1000px;

margin:auto;

padding:50px 20px 80px;

}


/* 曲一覧 */

.song-list{

background:rgba(255,255,255,.9);

padding:30px;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

margin-bottom:70px;

}

.song-list h2{

margin-top:0;

}

.song-grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

gap:12px;

}

.song-grid a{

background:white;

padding:12px;

border-radius:10px;

text-decoration:none;

color:#444;

transition:.25s;

box-shadow:0 4px 10px rgba(0,0,0,.05);

}

.song-grid a:hover{

transform:translateY(-3px);

background:#f5f5f5;

}


/* 曲カード */

.song-card{

background:rgba(255,255,255,.9);

padding:28px;

border-radius:18px;

margin-bottom:45px;

box-shadow:0 15px 35px rgba(0,0,0,.1);

opacity:0;
transform:translateY(40px);

}

.song-card.show{

opacity:1;
transform:none;

transition:all .8s ease;

}

.song-title{

font-size:22px;
font-weight:bold;

}

.artist{

color:#666;

}

iframe{

width:100%;
height:315px;

border:none;

margin-top:15px;

border-radius:12px;

}

.comment{

background:#f3f3f3;

padding:15px;

border-radius:10px;

margin-top:15px;

}


/* footer */

.footer{

text-align:center;

color:#777;

margin-top:60px;

}

</style>
</head>

<body id="top">

<div class="hero">

<div class="hero-title">
健啓Webオンリー イメージソング企画
</div>

</div>


<div class="container">


<div class="song-list">

<h2>🎵 イメージソング一覧</h2>

<div class="song-grid">

<a href="#song1">01 曲名 / アーティスト</a>
<a href="#song2">02 曲名 / アーティスト</a>
<a href="#song3">03 曲名 / アーティスト</a>

</div>

</div>


<div class="song-card" id="song1">

<div class="song-title">01 曲名</div>
<div class="artist">アーティスト名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント
</div>

</div>


<div class="song-card" id="song2">

<div class="song-title">02 曲名</div>
<div class="artist">アーティスト名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント
</div>

</div>


<div class="song-card" id="song3">

<div class="song-title">03 曲名</div>
<div class="artist">アーティスト名</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">
💬 コメント
</div>

</div>


<div class="footer">
健啓Webオンリー企画
</div>

</div>


<script>

const cards=document.querySelectorAll(".song-card")

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("show")

}

})

})

cards.forEach(card=>observer.observe(card))

</script>


</body>
</html>
