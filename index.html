<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>健啓Webオンリー イメージソング企画</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
color:white;
line-height:1.7;

background:
radial-gradient(circle at 20% 20%,#4a4a5e 0%,transparent 40%),
linear-gradient(#2b2b34,#14141b);
}


/* header banner */

.hero{

width:100%;
height:340px;

background-image:url("header.jpeg");
background-size:cover;
background-position:center;

display:flex;
align-items:flex-end;
justify-content:center;

box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.hero-title{

background:rgba(0,0,0,.45);
padding:14px 30px;
border-radius:10px;
margin-bottom:25px;
backdrop-filter:blur(6px);

font-size:20px;

}

/* container */

.container{
max-width:1000px;
margin:auto;
padding:50px 20px 80px;
}

/* intro */

.intro{
text-align:center;
margin-bottom:50px;
color:#ddd;
}

/* song list */

.song-grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;

}

.song-card{

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

padding:20px;
border-radius:16px;

box-shadow:0 10px 25px rgba(0,0,0,.3);

transition:.25s;

}

.song-card:hover{

transform:translateY(-6px);

background:rgba(255,255,255,0.16);

}

.song-title{

font-weight:bold;
font-size:18px;

}

iframe{

width:100%;
height:180px;
margin-top:10px;
border:none;
border-radius:10px;

}

.comment{

margin-top:12px;

background:rgba(255,255,255,0.12);

padding:12px;
border-radius:8px;

font-size:14px;

color:#eee;

}

/* footer */

.footer{

text-align:center;
margin-top:60px;
color:#aaa;
font-size:14px;

}

</style>
</head>

<body>

<div class="hero">

<div class="hero-title">
健啓Webオンリー イメージソング企画
</div>

</div>



<div class="container">

<div class="intro">

応募いただいたイメージソングを公開しています。<br>
素敵な楽曲をご応募いただきありがとうございました。

</div>



<div class="song-grid">

<div class="song-card">

<div class="song-title">
01 曲名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント  
ここに募集コメント

</div>

</div>



<div class="song-card">

<div class="song-title">
02 曲名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント

</div>

</div>



<div class="song-card">

<div class="song-title">
03 曲名
</div>

<iframe src="https://www.youtube.com/embed/動画ID"></iframe>

<div class="comment">

💬 コメント

</div>

</div>



</div>


<div class="footer">

健啓Webオンリー企画

</div>


</div>

</body>
</html>
